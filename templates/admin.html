<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { color: #ff4b2b; text-align: center; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #ff4b2b; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h2>💌 Kelgan Xabarlar</h2>
        <table>
            <thead>
                <tr><th>Vaqt</th><th>Xabar</th></tr>
            </thead>
            <tbody>
                {{range .Messages}}
                <tr>
                    <td style="font-size: 12px; color: #999;">{{.CreatedAt.Format "02.01 15:04"}}</td>
                    <td><b>{{.Content}}</b></td>
                </tr>
                {{else}}
                <tr><td colspan="2" style="text-align: center;">Hali xabar yo'q</td></tr>
                {{end}}
            </tbody>
        </table>
    </div>
</body>
</html>
