<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>💌 Kelgan Javoblar</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { color: #ff4b2b; text-align: center; border-bottom: 2px solid #fff5f5; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #ff4b2b; color: white; border-radius: 5px; }
        .time { font-size: 13px; color: #999; }
        tr:hover { background: #fffaf9; }
    </style>
</head>
<body>
    <div class="container">
        <h2>💌 Zar'dan Kelgan Xabarlar</h2>
        <table>
            <thead>
                <tr>
                    <th width="30%">Sana va Vaqt</th>
                    <th>Xabar</th>
                </tr>
            </thead>
            <tbody>
                {{range .Messages}}
                <tr>
                    <td class="time">{{.CreatedAt.Format "02-Jan, 15:04"}}</td>
                    <td style="font-weight: bold; color: #333;">{{.Content}}</td>
                </tr>
                {{else}}
                <tr>
                    <td colspan="2" style="text-align: center; color: #999;">Hozircha xabarlar yo'q...</td>
                </tr>
                {{end}}
            </tbody>
        </table>
        <br>
        <a href="/" style="color: #ff4b2b; text-decoration: none;">← Asosiy sahifa</a>
    </div>
</body>
</html>
