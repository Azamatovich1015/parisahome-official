<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Siz uchun maxsus</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); 
        }
        .heart-card { 
            background: white; 
            padding: 3rem; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            text-align: center;
            max-width: 400px;
        }
        h1 { color: #ff4b2b; font-size: 2.5rem; margin-bottom: 10px; }
        p { color: #555; font-size: 1.2rem; line-height: 1.6; }
        .heart { color: #ff4b2b; font-size: 50px; animation: beat .25s infinite alternate; }
        @keyframes beat { to { transform: scale(1.2); } }
    </style>
</head>
<body>
    <div class="heart-card">
        <div class="heart">❤️</div>
        <h1>Salom!</h1>
        <p>Sizga aytmoqchi bo'lgan muhim gapim bor edi...</p>
        <p><strong>{{.Message}}</strong></p>
    </div>
</body>
</html>
