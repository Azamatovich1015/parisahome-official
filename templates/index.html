<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parisahome - Ishga qabul</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .form-container { max-width: 600px; margin: 50px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .logo { display: block; margin: 0 auto 20px; max-width: 150px; }
        .btn-submit { background-color: #ffc107; border: none; width: 100%; padding: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="form-container">
        <img src="/static/logo.jpg" alt="Parisahome Logo" class="logo">
        
        <h3 class="text-center mb-4">Ishga qabul anketasi</h3>

        {{ if .Success }}
            <div class="alert alert-success">{{ .Success }}</div>
        {{ end }}

        <form action="/apply" method="POST">
            <div class="mb-3">
                <label class="form-label">F.I.SH</label>
                <input type="text" name="full_name" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Telefon raqamingiz</label>
                <input type="text" name="phone" class="form-control" placeholder="+998" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Yoshingiz</label>
                <input type="number" name="age" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Manzilingiz</label>
                <input type="text" name="address" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Ish tajribangiz</label>
                <textarea name="experience" class="form-control" rows="3"></textarea>
            </div>
            
            <div class="mb-4">
                <label class="form-label">Qaysi lavozimda ishlashni xohlaysiz?</label>
                <input type="text" name="job_title" class="form-control" placeholder="Lavozimni yozing" required>
            </div>

            <button type="submit" class="btn btn-submit text-dark">YUBORISH</button>
        </form>
    </div>
</div>

</body>
</html>
